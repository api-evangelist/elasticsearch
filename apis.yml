aid: elasticsearch
name: Elasticsearch
description: >-
  Elasticsearch is an open source search and analytics engine for all types of
  data, including textual, numerical, geospatial, structured, and unstructured.
  It provides a RESTful API for indexing, searching, and managing data, with
  powerful aggregation capabilities and real-time analytics at scale.
